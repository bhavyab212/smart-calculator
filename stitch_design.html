<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Casio fx-991CW Replica</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#520070",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed-dim": "#00dbe7",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-fixed-dim": "#4fdbc8",
                        "primary-fixed": "#74f5ff",
                        "inverse-surface": "#e5e2e1",
                        "surface-bright": "#3a3939",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#3a494b",
                        "on-background": "#e5e2e1",
                        "surface-variant": "#353534",
                        "outline": "#849495",
                        "secondary-container": "#d05bff",
                        "inverse-on-surface": "#313030",
                        "surface-tint": "#00dbe7",
                        "on-primary-container": "#006a71",
                        "secondary": "#ecb1ff",
                        "primary": "#e1fdff",
                        "tertiary-container": "#68f0dc",
                        "secondary-fixed": "#f9d8ff",
                        "secondary-fixed-dim": "#ecb1ff",
                        "on-primary-fixed-variant": "#004f54",
                        "on-tertiary": "#003731",
                        "on-tertiary-fixed-variant": "#005048",
                        "on-primary-fixed": "#002022",
                        "on-secondary-fixed-variant": "#75009e",
                        "surface-container-highest": "#353534",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#00f2ff",
                        "inverse-primary": "#00696f",
                        "on-surface-variant": "#b9cacb",
                        "on-primary": "#00363a",
                        "surface-container": "#201f1f",
                        "on-error": "#690005",
                        "on-surface": "#e5e2e1",
                        "on-tertiary-container": "#006c61",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#71f8e4",
                        "on-tertiary-fixed": "#00201c",
                        "surface-dim": "#131313",
                        "background": "#131313",
                        "on-secondary-container": "#480063",
                        "surface": "#131313",
                        "error-container": "#93000a",
                        "on-secondary-fixed": "#320046",
                        "tertiary": "#d9fff7"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "keypad-gutter": "8px",
                        "display-padding": "32px",
                        "container-margin": "16px",
                        "section-gap": "24px"
                    },
                    fontFamily: {
                        "keypad-secondary": ["Inter"],
                        "display-input": ["JetBrains Mono"],
                        "display-result": ["Inter"],
                        "keypad-primary": ["Inter"],
                        "label-status": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "keypad-secondary": ["11px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }],
                        "display-input": ["20px", { lineHeight: "1.5", fontWeight: "400" }],
                        "display-result": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "300" }],
                        "keypad-primary": ["18px", { lineHeight: "1", fontWeight: "500" }],
                        "label-status": ["12px", { lineHeight: "1", fontWeight: "600" }]
                    },
                    boxShadow: {
                        'glow-primary': '0 0 10px rgba(116, 245, 255, 0.5)',
                        'glow-secondary': '0 0 10px rgba(249, 216, 255, 0.5)',
                        'inner-glass': 'inset 0 1px 1px rgba(255,255,255,0.1)',
                    },
                    backgroundImage: {
                        'lcd-grid': 'linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px)',
                    }
                }
            }
        }
    </script>
<style>
        .lcd-glow {
            text-shadow: 0 0 8px rgba(0, 219, 231, 0.3);
        }
        .btn-glass {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.2s ease;
        }
        .btn-glass:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<!-- Main Calculator Container -->
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant/30 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
<!-- Subtle Hardware Texture Background -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-container-high/20 to-transparent pointer-events-none"></div>
<!-- Top App Bar (Re-imagined as Hardware Branding/Status) -->
<div class="flex justify-between items-center mb-6 relative z-10 border-b border-outline-variant/30 pb-2">
<div class="font-display-input text-display-input font-bold text-primary-fixed tracking-tighter">CASIO</div>
<div class="flex items-center gap-4">
<span class="font-label-status text-label-status uppercase tracking-widest text-primary-fixed-dim">fx-991CW</span>
<div class="flex gap-2">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">settings</span>
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">info</span>
</div>
</div>
</div>
<!-- LCD Display Area -->
<div class="bg-gradient-to-b from-[#1a2e30] to-[#0d1415] rounded-lg border border-[#3a494b]/50 p-display-padding mb-6 relative shadow-inner overflow-hidden flex flex-col h-40">
<!-- Grid Pattern -->
<div class="absolute inset-0 bg-lcd-grid" style="background-size: 4px 4px;"></div>
<!-- Status Indicators -->
<div class="relative z-10 flex justify-between font-label-status text-[10px] text-tertiary-fixed-dim/70 mb-2">
<span>SHIFT</span>
<span>ALPHA</span>
<span>MATH</span>
<span>RAD</span>
</div>
<!-- Input Equation -->
<div class="relative z-10 font-display-input text-display-input text-primary-fixed lcd-glow flex-1 flex items-start mt-2">
                ∫(sin(x²)) dx
                <span class="inline-block w-2 h-5 bg-primary-fixed ml-1 animate-pulse"></span>
</div>
<!-- Result -->
<div class="relative z-10 font-display-result text-display-result text-primary-fixed lcd-glow text-right w-full self-end">
                ½x - ¼sin(2x)
            </div>
</div>
<!-- Keypad Area -->
<div class="grid grid-cols-5 gap-keypad-gutter relative z-10">
<!-- Row 1: Top Functions -->
<div class="flex flex-col items-center col-span-1">
<span class="font-keypad-secondary text-[9px] text-secondary-fixed-dim mb-1">SETUP</span>
<button class="w-full h-10 rounded-full bg-surface-container-high/10 border border-white/10 btn-glass font-keypad-secondary text-on-surface hover:bg-surface-container-high/20 flex items-center justify-center group shadow-inner-glass">
<span class="text-secondary-fixed-dim group-hover:shadow-glow-secondary rounded-full px-2 py-1 transition-shadow">SHIFT</span>
</button>
</div>
<div class="flex flex-col items-center col-span-1">
<span class="font-keypad-secondary text-[9px] text-primary-fixed mb-1">A</span>
<button class="w-full h-10 rounded-full bg-surface-container-high/10 border border-white/10 btn-glass font-keypad-secondary text-on-surface hover:bg-surface-container-high/20 flex items-center justify-center group shadow-inner-glass">
<span class="text-primary-fixed group-hover:shadow-glow-primary rounded-full px-2 py-1 transition-shadow">ALPHA</span>
</button>
</div>
<!-- Nav Pad -->
<div class="col-span-2 row-span-2 flex items-center justify-center relative">
<div class="w-24 h-24 rounded-full bg-surface-container-low border border-outline-variant/30 relative flex items-center justify-center shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
<button class="absolute top-1 p-2 text-on-surface-variant hover:text-primary-fixed transition-colors"><span class="material-symbols-outlined text-[20px]">expand_less</span></button>
<button class="absolute bottom-1 p-2 text-on-surface-variant hover:text-primary-fixed transition-colors"><span class="material-symbols-outlined text-[20px]">expand_more</span></button>
<button class="absolute left-1 p-2 text-on-surface-variant hover:text-primary-fixed transition-colors"><span class="material-symbols-outlined text-[20px]">chevron_left</span></button>
<button class="absolute right-1 p-2 text-on-surface-variant hover:text-primary-fixed transition-colors"><span class="material-symbols-outlined text-[20px]">chevron_right</span></button>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/50 shadow-inner"></div>
</div>
</div>
<div class="flex flex-col items-center col-span-1">
<span class="font-keypad-secondary text-[9px] text-on-surface-variant opacity-0 mb-1">.</span>
<button class="w-full h-10 rounded-full bg-surface-container-high/10 border border-white/10 btn-glass font-keypad-secondary text-on-surface hover:bg-surface-container-high/20 flex items-center justify-center shadow-inner-glass">
                    MENU
                </button>
</div>
<!-- Row 2: Secondary Functions (below shift/alpha) -->
<div class="col-span-1 flex items-end">
<button class="w-full h-10 rounded-lg bg-surface-container-high/10 border border-white/10 btn-glass font-keypad-secondary text-on-surface hover:bg-surface-container-high/20 flex items-center justify-center shadow-inner-glass text-[14px]">
                    OPTN
                </button>
</div>
<div class="col-span-1 flex items-end">
<button class="w-full h-10 rounded-lg bg-surface-container-high/10 border border-white/10 btn-glass font-keypad-secondary text-on-surface hover:bg-surface-container-high/20 flex items-center justify-center shadow-inner-glass text-[14px]">
                    CALC
                </button>
</div>
<div class="col-span-1 flex flex-col justify-end">
<span class="font-keypad-secondary text-[9px] text-error mx-auto mb-1">OFF</span>
<button class="w-full h-10 rounded-lg bg-surface-container-high/10 border border-error/30 btn-glass font-keypad-secondary text-error hover:bg-error/10 flex items-center justify-center shadow-inner-glass text-[14px]">
                    AC
                </button>
</div>
<!-- Math Operators Row -->
<button class="col-span-1 h-12 rounded-lg bg-surface-container-low border border-white/5 btn-glass font-display-input text-on-surface hover:bg-surface-container-high/30 flex items-center justify-center shadow-inner-glass">
<span class="material-symbols-outlined text-[18px]">functions</span>
</button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-low border border-white/5 btn-glass font-display-input text-on-surface hover:bg-surface-container-high/30 flex items-center justify-center shadow-inner-glass">
                √□
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-low border border-white/5 btn-glass font-display-input text-on-surface hover:bg-surface-container-high/30 flex items-center justify-center shadow-inner-glass">
                x²
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-low border border-white/5 btn-glass font-display-input text-on-surface hover:bg-surface-container-high/30 flex items-center justify-center shadow-inner-glass">
                log
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-low border border-white/5 btn-glass font-display-input text-on-surface hover:bg-surface-container-high/30 flex items-center justify-center shadow-inner-glass">
                ln
            </button>
<!-- Numbers & Basic Ops -->
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                7
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                8
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                9
            </button>
<button class="col-span-1 h-12 rounded-lg bg-[#1a0505]/40 border border-error/20 btn-glass font-keypad-primary text-error hover:bg-[#2a0505]/60 flex items-center justify-center shadow-inner-glass text-[16px]">
                DEL
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-lowest border border-outline-variant/50 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container-low/50 flex items-center justify-center shadow-inner-glass text-[18px]">
                ÷
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                4
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                5
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                6
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-lowest border border-outline-variant/50 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container-low/50 flex items-center justify-center shadow-inner-glass text-[18px]">
                ×
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-lowest border border-outline-variant/50 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container-low/50 flex items-center justify-center shadow-inner-glass text-[18px]">
                -
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                1
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                2
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                3
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-lowest border border-outline-variant/50 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container-low/50 flex items-center justify-center shadow-inner-glass text-[18px]">
                +
            </button>
<!-- Large EXE Button -->
<button class="col-span-1 row-span-2 h-full rounded-lg bg-[#002022]/40 border border-primary-fixed/30 btn-glass font-keypad-primary text-primary-fixed hover:bg-[#00363a]/60 hover:shadow-glow-primary flex items-center justify-center shadow-[inset_0_1px_1px_rgba(116,245,255,0.2)] text-[20px] transition-all">
                EXE
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                0
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[20px]">
                .
            </button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container/30 border border-white/5 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container/50 flex items-center justify-center shadow-inner-glass text-[16px]">
                ×10<sup class="text-[10px]">x</sup>
</button>
<button class="col-span-1 h-12 rounded-lg bg-surface-container-lowest border border-outline-variant/50 btn-glass font-keypad-primary text-on-surface hover:bg-surface-container-low/50 flex items-center justify-center shadow-inner-glass text-[16px]">
                Ans
            </button>
</div>
</div>
</body></html>
